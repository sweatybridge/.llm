[*]
; reserve 1GB VRAM for mmproj file
fitt = 960
; minimum context length for useful work
fitc = 131072
; subagents run in parallel and share context
np = 1
; quantized kv cache is 30% faster
ctk = q8_0
ctv = q8_0
; flash attention reduces VRAM usage
fa = on
no-mmap = true
mlock = true
jinja = true

[Gemma4-26B-A4B]
; load-on-startup = true
model = E:\llama.cpp\gemma-4-26B-A4B\QAT-Q4_0.gguf
mmproj = E:\llama.cpp\gemma-4-26B-A4B\mmproj-qat.gguf
fitt = 1280
; reduce system memory usage for cpu offloading
; cram = 0
temp = 1.0
top-p = 0.95
top-k = 64

[Gemma4-Coder]
load-on-startup = true
model = E:\llama.cpp\gemma-4-26B-A4B\QAT-Q4_0.gguf
no-mmproj = true
; no need to reserve VRAM for vision encoder
fitt = 0
fitc = 0
temp = 1.0
top-p = 0.95
top-k = 64

